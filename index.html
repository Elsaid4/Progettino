<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <audio id="audioPlayer">
        <source src="Music/Milky - Just The Way You Are.mp3" type="audio/mpeg">
    </audio>
    <audio loop id="yeyAudioPlayer">
        <source src="Music/Yayyy! Sound Effect.mp3" type="audio/mpeg">
    </audio>
    <audio id="noAudioPlayer">
        <source src="Music/BuzzerNo.m4a" type="audio/mpeg">
    </audio>
    <audio id="explosionAudioPlayer">
        <source src="Music/esplosione.m4a" type="audio/mpeg">
    </audio>

    <div class="container-fluid d-flex justify-content-center align-items-center" style="height: 90vh;">
        <div class="row">
            <div class="col-12 text-center">
                <div class="card mt-5" style="">
                    <div class="card-body d-flex flex-column justify-content-between align-items-center">
                        <h1 class="card-title">Vuoi essere la mia fidanzata?</h1>
                        <div class="d-flex justify-content-center" style="gap: 20px;">
                            <img id="img1" class="img-fluid">
                            <img id="img2" class="img-fluid">   
                        </div>
                        <div>
                            <button id="yesBtn" class="btn btn-success m-2" style="width: 60px; height: 50px;">Sì</button>
                            <button id="noBtn" class="btn btn-danger m-2" style="width: 60px; height: 50px;">No</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>


    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
